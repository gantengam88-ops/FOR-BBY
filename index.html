<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-hearts"></div>

<div class="card">

    <div class="gift">

        <img src="img/bear.png" alt="Cute Bear">

    </div>

    <h3 class="small">
        ✨ A Little Surprise ✨
    </h3>

    <h1>
        HEY...
        <br>
        THIS IS
        <br>
        FOR U 💖
    </h1>

    <p>
        Aku punya sesuatu yang ingin aku berikan untukmu...
    </p>

    <button id="openBtn">
        🎁 OPEN YOUR GIFT
    </button>

</div>

<div id="letterPage">

    <div class="letter">

        <h1>Happy Birthday ❤️</h1>

        <p id="typing"></p>

       <img src="img/1.jpeg" class="photo">

    </div>

</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>

</html>
